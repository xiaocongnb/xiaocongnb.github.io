<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>河南2026年中考成绩查询平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background-color: #f0f4f9;
        }
        .container {
            width: 600px;
            margin: 80px auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 2px 15px #ccd6e3;
        }
        h1 {
            text-align: center;
            color: #2255aa;
            margin-bottom: 30px;
            font-size: 24px;
        }
        .input-box {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 16px;
            margin-bottom: 8px;
            color: #333;
        }
        input {
            width: 100%;
            height: 42px;
            padding: 0 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
        }
        button {
            width: 100%;
            height: 45px;
            background: #2255aa;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 17px;
            cursor: pointer;
        }
        button:hover {
            background: #1a4488;
        }
        .score-wrap {
            margin-top: 30px;
            display: none;
        }
        .score-title {
            font-size: 20px;
            text-align: center;
            margin-bottom: 20px;
            color: #222;
        }
        .score-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
            font-size: 16px;
        }
        .total {
            font-size: 19px;
            font-weight: bold;
            color: #d03030;
            margin-top: 15px;
        }
        .tips {
            color: #999;
            font-size: 13px;
            margin-top: 25px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>河南2026年中考成绩查询平台</h1>
        <div class="login-box">
            <div class="input-box">
                <label>考生姓名</label>
                <input type="text" id="name" placeholder="请输入考生姓名">
            </div>
            <div class="input-box">
                <label>身份证号</label>
                <input type="text" id="idCard" placeholder="请输入身份证号">
            </div>
            <button onclick="checkScore()">查询成绩</button>
        </div>
        <div class="score-wrap" id="scoreBox">
            <div class="score-title">考生成绩通知单</div>
            <div class="score-item">
                <span>考生姓名：</span>
                <span id="showName"></span>
            </div>
            <div class="score-item">
                <span>身份证号：</span>
                <span id="showIdCard"></span>
            </div>
            <div class="score-item">
                <span>语文：</span>
                <span id="chinese"></span>
            </div>
            <div class="score-item">
                <span>数学：</span>
                <span id="math"></span>
            </div>
            <div class="score-item">
                <span>英语：</span>
                <span id="english"></span>
            </div>
            <div class="score-item">
                <span>物理：</span>
                <span id="physics"></span>
            </div>
            <div class="score-item">
                <span>化学：</span>
                <span id="chemistry"></span>
            </div>
            <div class="score-item">
                <span>道法历史：</span>
                <span id="politics"></span>
            </div>
            <div class="score-item">
                <span>体育：</span>
                <span id="sport"></span>
            </div>
            <div class="score-item total">
                <span>总分：</span>
                <span id="totalScore"></span>
            </div>
        </div>
        <div class="tips"></div>
    </div>
<script>
// 指定四人固定分数
const studentData = {
    "高新新": {
        total: 345,
        chinese: 42,
        math: 38,
        english: 35,
        physics: 22,
        chemistry: 18,
        politics: 60,
        sport: 130
    },
    "陈家辉": {
        total: 496,
        chinese: 94,
        math: 78,
        english: 67,
        physics: 44,
        chemistry: 30,
        politics: 56,
        sport: 127
    }，   
    "孙一苒": {
        total: 216,
        chinese: 62,
        math: 21,
        english: 23,
        physics: 14,
        chemistry: 6,
        politics: 45,
        sport: 41
    },
    "吴一鸣": {
        total: 378,
        chinese: 73,
        math: 39,
        english: 36,
        physics: 22,
        chemistry: 19,
        politics: 60,
        sport: 127
    },
    "邱嘉祥": {
        total: 588,
        chinese: 102,
        math: 98,
        english: 96,
        physics: 78,
        chemistry: 69,
        politics: 85,
        sport: 60
    }
};

// 生成随机总分300以下的各科成绩
function getRandomLowScore() {
    // 随机总分150~299
    let total = Math.floor(Math.random() * 150) + 150;
    let c = Math.floor(Math.random() * 60);
    let m = Math.floor(Math.random() * 55);
    let e = Math.floor(Math.random() * 50);
    let wl = Math.floor(Math.random() * 35);
    let hx = Math.floor(Math.random() * 30);
    let zdls = Math.floor(Math.random() * 70);
    let ty = total - (c + m + e + wl + hx + zdls);
    // 防止体育分数负数
    if (ty < 0) ty = 0;
    return {
        total: total,
        chinese: c,
        math: m,
        english: e,
        physics: wl,
        chemistry: hx,
        politics: zdls,
        sport: ty
    };
}

function checkScore() {
    let name = document.getElementById("name").value.trim();
    let idCard = document.getElementById("idCard").value.trim();

    // 空值判断
    if (name === "" || idCard === "") {
        alert("请完整填写考生姓名和身份证号！");
        return;
    }

    // 姓名长度校验 1~3字
    if (name.length < 1 || name.length > 3) {
        alert("请完整填写考生姓名和身份证号！");
        return;
    }

    let score;
    if (studentData.hasOwnProperty(name)) {
        score = studentData[name];
    } else {
        score = getRandomLowScore();
    }

    // 渲染页面
    document.getElementById("showName").innerText = name;
    document.getElementById("showIdCard").innerText = idCard;
    document.getElementById("chinese").innerText = score.chinese;
    document.getElementById("math").innerText = score.math;
    document.getElementById("english").innerText = score.english;
    document.getElementById("physics").innerText = score.physics;
    document.getElementById("chemistry").innerText = score.chemistry;
    document.getElementById("politics").innerText = score.politics;
    document.getElementById("sport").innerText = score.sport;
    document.getElementById("totalScore").innerText = score.total;

    document.getElementById("scoreBox").style.display = "block";
}
</script>
</body>
</html>

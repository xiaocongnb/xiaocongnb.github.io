<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>河南2026年中考成绩查询平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
        }
        body {
            background: linear-gradient(135deg, #e8f0fe 0%, #d4e4fa 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(34, 85, 170, 0.12);
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        h1 {
            text-align: center;
            color: #2255aa;
            margin-bottom: 8px;
            font-size: 26px;
            font-weight: 600;
        }
        .subtitle {
            text-align: center;
            color: #889;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .input-box {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 15px;
            margin-bottom: 8px;
            color: #444;
            font-weight: 500;
        }
        input {
            width: 100%;
            height: 46px;
            padding: 0 14px;
            border: 1px solid #d0d7de;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #2255aa;
            box-shadow: 0 0 0 3px rgba(34, 85, 170, 0.08);
        }
        input::placeholder {
            color: #bbb;
        }
        .error-msg {
            color: #d03030;
            font-size: 13px;
            margin-top: 4px;
            display: none;
        }
        button {
            width: 100%;
            height: 48px;
            background: #2255aa;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }
        button:hover:not(:disabled) {
            background: #1a4488;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(34, 85, 170, 0.25);
        }
        button:active:not(:disabled) {
            transform: translateY(0);
        }
        button:disabled {
            background: #a0aec0;
            cursor: not-allowed;
        }
        .score-wrap {
            margin-top: 30px;
            display: none;
            animation: slideUp 0.4s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .score-header {
            text-align: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid #f0f4f9;
        }
        .score-title {
            font-size: 20px;
            color: #222;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .score-subtitle {
            font-size: 13px;
            color: #889;
        }
        .score-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #f0f4f9;
            font-size: 15px;
        }
        .score-item span:first-child {
            color: #555;
        }
        .score-item span:last-child {
            font-weight: 600;
            color: #333;
            font-variant-numeric: tabular-nums;
        }
        .score-item.total {
            border-bottom: none;
            border-top: 2px solid #e0e8f5;
            margin-top: 8px;
            padding-top: 16px;
        }
        .score-item.total span {
            font-size: 18px;
            color: #d03030;
        }
        .score-item.total span:first-child {
            color: #d03030;
        }
        .new-journey-btn {
            margin-top: 20px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            color: white;
            border: none;
            font-size: 17px;
            font-weight: 600;
        }
        .new-journey-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, #ee5a6f 0%, #ff6b6b 100%);
            box-shadow: 0 4px 16px rgba(238, 90, 111, 0.35);
        }
        .blessing-wrap {
            margin-top: 30px;
            display: none;
            animation: slideUp 0.5s ease-out;
        }
        .blessing-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
            padding: 50px 30px;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
        }
        .blessing-card::before {
            content: '😂';
            position: absolute;
            top: 15px;
            left: 20px;
            font-size: 24px;
            opacity: 0.6;
            animation: twinkle 2s ease-in-out infinite;
        }
        .blessing-card::after {
            content: '😂';
            position: absolute;
            bottom: 15px;
            right: 20px;
            font-size: 24px;
            opacity: 0.6;
            animation: twinkle 2s ease-in-out infinite 1s;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.2); }
        }
        .blessing-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.15);
        }
        .blessing-text {
            font-size: 18px;
            line-height: 2;
            margin-bottom: 10px;
        }
        .blessing-joke {
            font-size: 16px;
            margin-top: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.15);
            border-radius: 12px;
            backdrop-filter: blur(5px);
        }
        .blessing-joke .laugh {
            font-size: 22px;
            margin-top: 8px;
            letter-spacing: 2px;
        }
        .back-btn {
            margin-top: 20px;
            background: #f0f4f9;
            color: #2255aa;
            border: 1px solid #d0d7de;
        }
        .back-btn:hover:not(:disabled) {
            background: #e2e8f0;
            color: #1a4488;
        }
        .tips {
            color: #999;
            font-size: 13px;
            margin-top: 25px;
            text-align: center;
            line-height: 1.6;
        }
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .stamp {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 80px;
            height: 80px;
            border: 3px solid #d03030;
            border-radius: 50%;
            color: #d03030;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            transform: rotate(-15deg);
            opacity: 0.15;
            pointer-events: none;
        }
        .score-box-relative {
            position: relative;
        }
        @media (max-width: 640px) {
            .container {
                margin: 10px auto;
                padding: 24px;
            }
            h1 { font-size: 22px; }
            .blessing-title { font-size: 24px; }
            .blessing-text { font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>河南2026年中考成绩查询平台</h1>
        <p class="subtitle">河南省教育考试院 官方查询入口</p>
        
        <!-- 查询页面 -->
        <div class="login-box" id="loginBox">
            <div class="input-box">
                <label for="name">考生姓名</label>
                <input type="text" id="name" placeholder="请输入考生姓名" maxlength="4" autocomplete="off">
                <div class="error-msg" id="nameError">请输入真实姓名</div>
            </div>
            <div class="input-box">
                <label for="idCard">身份证号</label>
                <input type="text" id="idCard" placeholder="请输入18位身份证号" maxlength="18" autocomplete="off">
                <div class="error-msg" id="idCardError">请输入有效的18位身份证号</div>
            </div>
            <button id="queryBtn" onclick="checkScore()">查询成绩</button>
        </div>

        <!-- 成绩页面 -->
        <div class="score-wrap" id="scoreBox">
            <div class="score-box-relative">
                <div class="stamp">已核验</div>
                <div class="score-header">
                    <div class="score-title">考生成绩通知单</div>
                    <div class="score-subtitle">2026年河南省初中学业水平考试</div>
                </div>
                <div class="score-item">
                    <span>考生姓名</span>
                    <span id="showName"></span>
                </div>
                <div class="score-item">
                    <span>身份证号</span>
                    <span id="showIdCard"></span>
                </div>
                <div class="score-item">
                    <span>语文</span>
                    <span id="chinese"></span>
                </div>
                <div class="score-item">
                    <span>数学</span>
                    <span id="math"></span>
                </div>
                <div class="score-item">
                    <span>英语</span>
                    <span id="english"></span>
                </div>
                <div class="score-item">
                    <span>物理</span>
                    <span id="physics"></span>
                </div>
                <div class="score-item">
                    <span>化学</span>
                    <span id="chemistry"></span>
                </div>
                <div class="score-item">
                    <span>道法历史</span>
                    <span id="politics"></span>
                </div>
                <div class="score-item">
                    <span>体育</span>
                    <span id="sport"></span>
                </div>
                <div class="score-item total">
                    <span>总分</span>
                    <span id="totalScore"></span>
                </div>
            </div>
            <button class="new-journey-btn" onclick="showBlessing()">继续</button>
        </div>

        <!-- 祝福页面 -->
        <div class="blessing-wrap" id="blessingBox">
            <div class="blessing-card">
                <div class="blessing-title">做梦去吧</div>
                <div class="blessing-text">小匆在这里祝你天天开心</div>
                <div class="blessing-joke">
                    哈哈哈哈哈哈哈哈哈
                    <div class="laugh">这个分数你做梦去吧</div>
                </div>
            </div>
            <button class="back-btn" onclick="resetForm()">返回重查</button>
        </div>

        <div class="tips">
            温馨提示：本系统仅供成绩查询使用，请妥善保管个人信息。<br>
            如有疑问，请联系当地教育考试院。
        </div>
    </div>

<!-- Firebase SDK -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBqmqVQU36RWTym27T3as601J40tXBesuM",
        authDomain: "xiaocong-be9f8.firebaseapp.com",
        projectId: "xiaocong-be9f8",
        storageBucket: "xiaocong-be9f8.firebasestorage.app",
        messagingSenderId: "43895574085",
        appId: "1:43895574085:web:98167106b948483bc19d2c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 把 db 暴露给全局，方便非模块脚本使用
    window.firebaseDB = db;
    window.firebaseCollection = collection;
    window.firebaseAddDoc = addDoc;
    window.firebaseServerTimestamp = serverTimestamp;
</script>

<script>
// localStorage 键名
const STORAGE_KEY = 'exam_scores_2026';

// 各科满分参考
const MAX_SCORES = {
    chinese: 120,
    math: 120,
    english: 120,
    physics: 70,
    chemistry: 40,
    politics: 110,
    sport: 130
};

// 指定考生固定分数
const studentData = {
    "高新新": { chinese: 42, math: 38, english: 35, physics: 22, chemistry: 18, politics: 60, sport: 130 },
    "陈家辉": { chinese: 94, math: 78, english: 67, physics: 44, chemistry: 30, politics: 56, sport: 127 },
    "孙一苒": { chinese: 62, math: 21, english: 23, physics: 14, chemistry: 6, politics: 45, sport: 41 },
    "韩懿轩": { chinese: 88, math: 21, english: 64, physics: 45, chemistry: 26, politics: 45, sport: 127 },
    "吴一鸣": { chinese: 73, math: 39, english: 36, physics: 22, chemistry: 19, politics: 60, sport: 127 },
    "邱嘉祥": { chinese: 102, math: 98, english: 96, physics: 56, chemistry: 36, politics: 85, sport: 126 }
};

// 计算总分
function calcTotal(scores) {
    return scores.chinese + scores.math + scores.english + scores.physics + 
           scores.chemistry + scores.politics + scores.sport;
}

// 初始化固定数据的总分
Object.keys(studentData).forEach(name => {
    studentData[name].total = calcTotal(studentData[name]);
});

// 从 localStorage 读取已保存的成绩
function getSavedScores() {
    try {
        const data = localStorage.getItem(STORAGE_KEY);
        return data ? JSON.parse(data) : {};
    } catch (e) {
        return {};
    }
}

// 保存成绩到 localStorage
function saveScore(name, scores) {
    const saved = getSavedScores();
    saved[name] = scores;
    try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
    } catch (e) {
        console.warn('保存成绩失败', e);
    }
}

// 生成随机高分（总分 500~630 之间）
function getRandomHighScore() {
    const c = Math.floor(Math.random() * 25) + 85;
    const m = Math.floor(Math.random() * 30) + 80;
    const e = Math.floor(Math.random() * 30) + 75;
    const p = Math.floor(Math.random() * 20) + 45;
    const h = Math.floor(Math.random() * 15) + 22;
    const z = Math.floor(Math.random() * 30) + 70;
    const s = Math.floor(Math.random() * 25) + 95;
    
    const scores = {
        chinese: c, math: m, english: e,
        physics: p, chemistry: h, politics: z, sport: s
    };
    scores.total = calcTotal(scores);
    return scores;
}

// 验证身份证号
function isValidIdCard(id) {
    const reg = /^[1-9]\d{5}(18|19|20)\d{2}((0[1-9])|(1[0-2]))(([0-2][1-9])|10|20|30|31)\d{3}[0-9Xx]$/;
    return reg.test(id);
}

// 验证姓名
function isValidName(name) {
    return /^[\u4e00-\u9fa5]{2,4}$/.test(name);
}

function showError(id, show) {
    document.getElementById(id).style.display = show ? 'block' : 'none';
}

function setLoading(loading) {
    const btn = document.getElementById('queryBtn');
    if (loading) {
        btn.disabled = true;
        btn.innerHTML = '<span class="loading"></span>查询中...';
    } else {
        btn.disabled = false;
        btn.innerHTML = '查询成绩';
    }
}

function renderScore(name, idCard, score) {
    document.getElementById("showName").textContent = name;
    // 完整显示身份证号
    document.getElementById("showIdCard").textContent = idCard;
    document.getElementById("chinese").textContent = score.chinese;
    document.getElementById("math").textContent = score.math;
    document.getElementById("english").textContent = score.english;
    document.getElementById("physics").textContent = score.physics;
    document.getElementById("chemistry").textContent = score.chemistry;
    document.getElementById("politics").textContent = score.politics;
    document.getElementById("sport").textContent = score.sport;
    document.getElementById("totalScore").textContent = score.total;
}

// 保存查询记录到 Firebase
async function saveToFirebase(name, idCard, score) {
    try {
        if (window.firebaseDB && window.firebaseAddDoc && window.firebaseCollection) {
            await window.firebaseAddDoc(window.firebaseCollection(window.firebaseDB, 'queryRecords'), {
                name: name,
                // 完整保存身份证号
                idCard: idCard,
                totalScore: score.total,
                chinese: score.chinese,
                math: score.math,
                english: score.english,
                physics: score.physics,
                chemistry: score.chemistry,
                politics: score.politics,
                sport: score.sport,
                timestamp: window.firebaseServerTimestamp ? window.firebaseServerTimestamp() : new Date().toISOString(),
                userAgent: navigator.userAgent,
                ip: 'client-side'
            });
            console.log('数据已保存到 Firebase');
        }
    } catch (e) {
        console.error('保存到 Firebase 失败:', e);
    }
}

function checkScore() {
    const name = document.getElementById("name").value.trim();
    const idCard = document.getElementById("idCard").value.trim();
    
    showError('nameError', false);
    showError('idCardError', false);

    if (!isValidName(name)) {
        showError('nameError', true);
        document.getElementById("name").focus();
        return;
    }

    if (!isValidIdCard(idCard)) {
        showError('idCardError', true);
        document.getElementById("idCard").focus();
        return;
    }

    setLoading(true);
    
    setTimeout(() => {
        let score;
        const savedScores = getSavedScores();
        
        if (studentData.hasOwnProperty(name)) {
            score = studentData[name];
        } else if (savedScores.hasOwnProperty(name)) {
            score = savedScores[name];
        } else {
            score = getRandomHighScore();
            saveScore(name, score);
        }

        renderScore(name, idCard, score);

        // 保存到 Firebase
        saveToFirebase(name, idCard, score);

        document.getElementById("loginBox").style.display = "none";
        document.getElementById("scoreBox").style.display = "block";
        document.getElementById("blessingBox").style.display = "none";
        setLoading(false);
    }, 800);
}

// 显示祝福页面
function showBlessing() {
    document.getElementById("scoreBox").style.display = "none";
    document.getElementById("blessingBox").style.display = "block";
}

function resetForm() {
    document.getElementById("scoreBox").style.display = "none";
    document.getElementById("blessingBox").style.display = "none";
    document.getElementById("loginBox").style.display = "block";
    document.getElementById("name").value = "";
    document.getElementById("idCard").value = "";
    document.getElementById("name").focus();
}

// 回车键提交
document.getElementById("idCard").addEventListener("keypress", function(e) {
    if (e.key === "Enter") checkScore();
});
document.getElementById("name").addEventListener("keypress", function(e) {
    if (e.key === "Enter") document.getElementById("idCard").focus();
});
</script>
</body>
</html>
